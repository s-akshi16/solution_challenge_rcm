<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 text-center">
    <h2>Welcome, {{ username }}</h2>
    <p class="text-muted">Audio monitoring is active. Leave this tab open.</p>

    <div class="card shadow p-5 mt-4 mx-auto" style="max-width: 500px;">
        <h4 id="status-text" class="text-success mb-3">System: Monitoring...</h4>
        <h1 id="db-display" class="display-4 mb-4">- dB</h1>
        
        <button id="manual-alert-btn" class="btn btn-danger btn-lg w-100 py-3 fs-3 fw-bold">
            EMERGENCY ALERT
        </button>
    </div>
    
    <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary mt-4">Log Out</a>
</div>

<script>
    let alertTriggered = false; 

    const DB_THRESHOLD = -15;           
    const DANGER_DURATION_MS = 800;     
    const SMOOTHING_FACTOR = 0.8;       
    
    let smoothedDb = -100;              
    let dangerStartTime = 0;            

    // 1. Request Microphone Access
    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            
            microphone.connect(analyser);
            analyser.fftSize = 1024;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Float32Array(bufferLength);

            function monitorAudio() {
                if (alertTriggered) return;

                analyser.getFloatTimeDomainData(dataArray);
                
                let sumSquares = 0.0;
                for (let i = 0; i < bufferLength; i++) {
                    sumSquares += dataArray[i] * dataArray[i];
                }
                let rms = Math.sqrt(sumSquares / bufferLength);
                
                let currentDb = 20 * Math.log10(Math.max(rms, 0.00001));
                smoothedDb = (SMOOTHING_FACTOR * smoothedDb) + ((1 - SMOOTHING_FACTOR) * currentDb);
                
                document.getElementById('db-display').innerText = smoothedDb.toFixed(1) + " dB";

                if (smoothedDb > DB_THRESHOLD) {
                    if (dangerStartTime === 0) {
                        dangerStartTime = Date.now();
                        document.getElementById('status-text').innerText = "Loud noise detected, analyzing...";
                        document.getElementById('status-text').className = "text-warning mb-3";
                    } 
                    else if (Date.now() - dangerStartTime > DANGER_DURATION_MS) {
                        getLocationAndTrigger();
                    }
                } else {
                    dangerStartTime = 0;
                    document.getElementById('status-text').innerText = "System: Monitoring...";
                    document.getElementById('status-text').className = "text-success mb-3";
                }

                requestAnimationFrame(monitorAudio);
            }
            monitorAudio();
        })
        .catch(err => {
            console.error("Microphone access denied:", err);
            document.getElementById('status-text').innerText = "Mic access denied!";
            document.getElementById('status-text').className = "text-danger fw-bold mb-3";
        });

    // 2. Location & Trigger Logic
    function getLocationAndTrigger() {
        if (alertTriggered) return;
        alertTriggered = true;

        document.getElementById('status-text').innerText = "DANGER DETECTED! Getting location...";
        document.getElementById('status-text').className = "text-danger fw-bold mb-3";
        document.body.classList.add('bg-danger');

        // Ask the browser for GPS coordinates
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    // Success! We got the location, now send the email
                    sendAlertToServer(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    // User denied location or it failed. Send email anyway without location.
                    console.error("Location error:", error);
                    sendAlertToServer(null, null); 
                }
            );
        } else {
            // Browser doesn't support geolocation
            sendAlertToServer(null, null);
        }
    }

    // 3. Send data to Flask
    function sendAlertToServer(lat, lng) {
        document.getElementById('status-text').innerText = "Sending Alert Email...";

        fetch('/trigger_alert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            // Attach the location data to the payload
            body: JSON.stringify({ latitude: lat, longitude: lng }) 
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('status-text').innerText = "ALERT SENT TO EMAIL.";
            } else {
                document.getElementById('status-text').innerText = "Failed to send alert.";
                console.error("Server Error:", data.error);
            }
        })
        .catch(error => {
            document.getElementById('status-text').innerText = "Network error occurred.";
            console.error("Fetch Error:", error);
        });
    }

    document.getElementById('manual-alert-btn').addEventListener('click', getLocationAndTrigger);
</script>

</body>
</html>
